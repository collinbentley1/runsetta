name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: production
  cancel-in-progress: false

env:
  PROJECT_ID: runsetta
  REGION: us-east4
  ARTIFACT_REGISTRY_REPOSITORY: api
  SERVICE_NAME: runsetta
  RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect deployable app
        id: app
        run: |
          set -euo pipefail
          if [ -f Dockerfile ]; then
            echo "deployable=true" >> "$GITHUB_OUTPUT"
            echo "image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${SERVICE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "deployable=false" >> "$GITHUB_OUTPUT"
            echo "No root-level Dockerfile exists yet; production deployment skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Authenticate to Google Cloud
        if: steps.app.outputs.deployable == 'true'
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_PROD_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup Docker Buildx
        if: steps.app.outputs.deployable == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Artifact Registry
        if: steps.app.outputs.deployable == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Setup gcloud
        if: steps.app.outputs.deployable == 'true'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Resolve runtime configuration
        if: steps.app.outputs.deployable == 'true'
        id: runtime
        run: |
          set -euo pipefail

          env_values="RUNSETTA_TTS_MODEL=gpt-4o-mini-tts,RUNSETTA_TTS_VOICE=marin"
          secret_mappings=()

          if gcloud secrets versions describe latest --project="${PROJECT_ID}" --secret="openai-api-key" >/dev/null 2>&1; then
            secret_mappings+=("OPENAI_API_KEY=openai-api-key:latest")
          else
            env_values="${env_values},RUNSETTA_OFFLINE=1"
          fi

          for mapping in \
            "SPOTIFY_CLIENT_ID=spotify-client-id" \
            "SPOTIFY_CLIENT_SECRET=spotify-client-secret" \
            "SPOTIFY_REDIRECT_URI=spotify-redirect-uri"; do
            env_name="${mapping%%=*}"
            secret_name="${mapping#*=}"

            if gcloud secrets versions describe latest --project="${PROJECT_ID}" --secret="${secret_name}" >/dev/null 2>&1; then
              secret_mappings+=("${env_name}=${secret_name}:latest")
            fi
          done

          flags="--set-env-vars=${env_values}"
          if [ "${#secret_mappings[@]}" -gt 0 ]; then
            secret_values="$(IFS=,; echo "${secret_mappings[*]}")"
            flags="${flags} --set-secrets=${secret_values}"
          fi

          echo "flags=${flags}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hardened Images
        if: steps.app.outputs.deployable == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_ACCESS_TOKEN }}

      - name: Build and push image
        if: steps.app.outputs.deployable == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.app.outputs.image }}

      - name: Deploy production to Cloud Run
        if: steps.app.outputs.deployable == 'true'
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ steps.app.outputs.image }}
          region: ${{ env.REGION }}
          skip_default_labels: true
          flags: >-
            --no-invoker-iam-check
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --ingress=all
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=300s
            ${{ steps.runtime.outputs.flags }}
            --labels=managed-by=github-actions,environment=production
