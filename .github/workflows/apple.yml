name: Apple

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  swift-package:
    name: Swift package check
    runs-on: macos-26
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Show toolchain
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version

      - name: Check RunsettaCore
        run: |
          set -euo pipefail
          swift build --package-path apple
          swift run --package-path apple RunsettaCoreCheck
